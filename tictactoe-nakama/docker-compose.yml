services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nakama}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  nakama:
    image: heroiclabs/nakama:3.22.0
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/nakama/data/modules/start.sh"]
    environment:
      NAKAMA_NAME: ${NAKAMA_NAME:-tictactoe-nakama}
      NAKAMA_SERVER_KEY: ${NAKAMA_SERVER_KEY:-defaultkey}
      NAKAMA_RUNTIME_HTTP_KEY: ${NAKAMA_RUNTIME_HTTP_KEY:-change-me-runtime-http-key}
      NAKAMA_SESSION_ENCRYPTION_KEY: ${NAKAMA_SESSION_ENCRYPTION_KEY:-change-me-session-encryption-key}
      NAKAMA_SESSION_REFRESH_ENCRYPTION_KEY: ${NAKAMA_SESSION_REFRESH_ENCRYPTION_KEY:-change-me-refresh-encryption-key}
      NAKAMA_SESSION_TOKEN_EXPIRY_SEC: ${NAKAMA_SESSION_TOKEN_EXPIRY_SEC:-7200}
      NAKAMA_SESSION_REFRESH_TOKEN_EXPIRY_SEC: ${NAKAMA_SESSION_REFRESH_TOKEN_EXPIRY_SEC:-86400}
      NAKAMA_CONSOLE_USERNAME: ${NAKAMA_CONSOLE_USERNAME:-admin}
      NAKAMA_CONSOLE_PASSWORD: ${NAKAMA_CONSOLE_PASSWORD:-admin123}
    ports:
      - "${NAKAMA_GRPC_PORT:-7349}:7349"
      - "${NAKAMA_HTTP_PORT:-7350}:7350"
      - "${NAKAMA_CONSOLE_PORT:-7351}:7351"
    volumes:
      - ./backend:/nakama/data/modules
      - ./backend/config.yml:/nakama/data/config.yml

  frontend:
    build: ./frontend
    depends_on:
      - nakama
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      VITE_NAKAMA_HOST: ${VITE_NAKAMA_HOST:-localhost}
      VITE_NAKAMA_PORT: ${VITE_NAKAMA_PORT:-7350}
      VITE_NAKAMA_USE_SSL: ${VITE_NAKAMA_USE_SSL:-false}
      VITE_NAKAMA_SERVER_KEY: ${VITE_NAKAMA_SERVER_KEY:-defaultkey}

volumes:
  pgdata:
