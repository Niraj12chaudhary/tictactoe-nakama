databases:
  - name: tictactoe-db
    databaseName: nakama
    user: nakama
    plan: free

services:
  # ── Nakama backend ──────────────────────────────────────────────────────────
  - type: web
    name: tictactoe-nakama
    env: docker
    rootDir: .
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /healthcheck
    envVars:
      - key: PORT
        value: 7350
      - key: NAKAMA_DATABASE_HOST
        fromDatabase:
          name: tictactoe-db
          property: host
      - key: NAKAMA_DATABASE_PORT
        fromDatabase:
          name: tictactoe-db
          property: port
      - key: NAKAMA_DATABASE_USER
        fromDatabase:
          name: tictactoe-db
          property: user
      - key: NAKAMA_DATABASE_PASSWORD
        fromDatabase:
          name: tictactoe-db
          property: password
      - key: NAKAMA_DATABASE_NAME
        fromDatabase:
          name: tictactoe-db
          property: database
      - key: NAKAMA_DATABASE_SSL
        value: require
      - key: NAKAMA_NAME
        value: tictactoe-nakama
      - key: NAKAMA_SERVER_KEY
        value: defaultkey
      - key: NAKAMA_RUNTIME_HTTP_KEY
        generateValue: true
      - key: NAKAMA_SESSION_ENCRYPTION_KEY
        generateValue: true
      - key: NAKAMA_SESSION_REFRESH_ENCRYPTION_KEY
        generateValue: true
      - key: NAKAMA_CONSOLE_USERNAME
        value: admin
      - key: NAKAMA_CONSOLE_PASSWORD
        value: admin123

  # ── React frontend ──────────────────────────────────────────────────────────
  - type: web
    name: tictactoe-frontend
    env: docker
    rootDir: .
    dockerfilePath: frontend/Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: VITE_NAKAMA_HOST
        fromService:
          name: tictactoe-nakama
          type: web
          property: host
      - key: VITE_NAKAMA_PORT
        value: 443
      - key: VITE_NAKAMA_USE_SSL
        value: "true"
      - key: VITE_NAKAMA_SERVER_KEY
        value: defaultkey
