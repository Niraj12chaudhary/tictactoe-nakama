databases:
  - name: tictactoe-db
    databaseName: nakama
    user: nakama
    plan: free

services:
  # ── Nakama backend ──────────────────────────────────────────────────────────
  - type: web
    name: tictactoe-nakama
    env: docker
    rootDir: tictactoe-nakama
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /healthcheck
    envVars:
      - key: PORT
        value: 7350
      # External connection string — uses public FQDN (dpg-xxx.oregon-postgres.render.com)
      # which resolves correctly inside Docker containers on Render's free tier.
      # internalConnectionString uses a short hostname that only Render's internal DNS
      # can resolve, but Docker containers don't use that DNS server.
      - key: NAKAMA_DATABASE_ADDRESS
        fromDatabase:
          name: tictactoe-db
          property: connectionString
      - key: NAKAMA_DATABASE_SSL
        value: require
      - key: NAKAMA_NAME
        value: tictactoe-nakama
      - key: NAKAMA_SERVER_KEY
        value: defaultkey
      - key: NAKAMA_RUNTIME_HTTP_KEY
        generateValue: true
      - key: NAKAMA_SESSION_ENCRYPTION_KEY
        generateValue: true
      - key: NAKAMA_SESSION_REFRESH_ENCRYPTION_KEY
        generateValue: true
      - key: NAKAMA_CONSOLE_USERNAME
        value: admin
      - key: NAKAMA_CONSOLE_PASSWORD
        value: admin123

  # ── React frontend ──────────────────────────────────────────────────────────
  - type: web
    name: tictactoe-frontend
    env: docker
    rootDir: tictactoe-nakama
    dockerfilePath: frontend/Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: VITE_NAKAMA_HOST
        fromService:
          name: tictactoe-nakama
          type: web
          property: host
      - key: VITE_NAKAMA_PORT
        value: 443
      - key: VITE_NAKAMA_USE_SSL
        value: "true"
      - key: VITE_NAKAMA_SERVER_KEY
        value: defaultkey
